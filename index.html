<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Web料理検索アプリ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-orange-50 min-h-screen flex items-center justify-center p-6">

<div class="bg-white shadow-xl rounded-3xl p-6 w-full max-w-2xl">

  <h1 class="text-2xl font-bold text-center text-orange-600 mb-2">
    🍳 Web料理検索アプリ
  </h1>

  <p class="text-center text-gray-500 mb-6">
    入力した食材に関連する料理情報をWikipediaから取得します
  </p>

  <div class="flex gap-2 mb-4">
    <input
      id="searchInput"
      type="text"
      placeholder="例：豚肉 キャベツ"
      class="flex-1 border rounded-xl p-2"
    />
    <button
      onclick="searchWikipedia()"
      class="bg-orange-500 text-white px-4 rounded-xl"
    >
      検索
    </button>
  </div>

  <div id="loading" class="hidden text-orange-500 mb-4">
    検索中...
  </div>

  <div id="results" class="space-y-4"></div>

</div>

<script>
async function searchWikipedia() {
  const query = document.getElementById("searchInput").value.trim();
  const resultsDiv = document.getElementById("results");
  const loadingDiv = document.getElementById("loading");

  if (!query) {
    alert("キーワードを入力してください");
    return;
  }

  resultsDiv.innerHTML = "";
  loadingDiv.classList.remove("hidden");

  try {
    const url = "https://ja.wikipedia.org/w/api.php?" +
      new URLSearchParams({
        action: "query",
        list: "search",
        srsearch: query + " 料理",
        format: "json",
        origin: "*"
      });

    const response = await fetch(url);
    const data = await response.json();

    loadingDiv.classList.add("hidden");

    if (data.query.search.length === 0) {
      resultsDiv.innerHTML = "<p class='text-gray-500'>結果が見つかりませんでした。</p>";
      return;
    }

    data.query.search.slice(0,5).forEach(item => {
      const pageUrl = "https://ja.wikipedia.org/wiki/" + encodeURIComponent(item.title);

      const card = document.createElement("div");
      card.className = "border rounded-xl p-4 bg-orange-50";

      card.innerHTML = `
        <h2 class="font-bold text-lg text-orange-700">${item.title}</h2>
        <p class="text-sm text-gray-600 mt-2">${item.snippet}...</p>
        <a href="${pageUrl}" target="_blank"
           class="text-blue-600 underline mt-2 inline-block">
           Wikipediaで詳しく見る
        </a>
      `;

      resultsDiv.appendChild(card);
    });

  } catch (error) {
    loadingDiv.classList.add("hidden");
    resultsDiv.innerHTML = "<p class='text-red-500'>データ取得に失敗しました。</p>";
  }
}
</script>

</body>
</html>
